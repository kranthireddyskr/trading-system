version: "3.9"

services:
  trading-bot:
    build: .
    command: ["python", "live_runner.py", "--watchlist", "trading_system/config/watchlist.txt", "--output-dir", "/app/live_logs", "--paper"]
    ports:
      - "8080:8080"
    environment:
      - STORAGE_DSN=postgresql://postgres:postgres@timescaledb:5432/trading
      - AWS_REGION=us-east-1
      - SECRETS_MANAGER_SECRET_ID=trading-bot/alpaca
    volumes:
      - ./live_logs:/app/live_logs
    depends_on:
      timescaledb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3

  timescaledb:
    image: timescale/timescaledb:latest-pg14
    environment:
      - POSTGRES_DB=trading
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - ./timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d trading"]
      interval: 10s
      timeout: 5s
      retries: 10
